


<h2>Add Contact</h2>

<form (ngSubmit)="addContact()">
  <input type="number" [(ngModel)]="newContact.id" name="id" placeholder="ID" required><br>
  <input type="text" [(ngModel)]="newContact.name" name="name" placeholder="Name" required><br>
  <input type="email" [(ngModel)]="newContact.email" name="email" placeholder="Email" required><br>
  <input type="text" [(ngModel)]="newContact.phone" name="phone" placeholder="Phone" required><br>

  <button type="submit">Add</button>
</form>
