
<!DOCTYPE html><html><head>
<title>Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/styles.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head><body>

<div id="navbar"></div>

<div class="container mt-5" style="max-width:400px">
<h3>Login</h3>

<form id="loginForm">
<input id="username" class="form-control mb-3" placeholder="Username" required>
<input id="password" type="password" class="form-control mb-3" placeholder="Password" required>
<button class="btn btn-dark w-100">Login</button>
</form>

<p class="mt-3 text-muted">Demo login: admin / 1234</p>

</div>

<script src="js/navbar.js"></script>

<script>
$("#loginForm").submit(function(e){
e.preventDefault();
let u=$("#username").val();
let p=$("#password").val();
if(u==="admin" && p==="1234"){
localStorage.setItem("user",u);
window.location="index.html";
}else{
alert("Invalid Login");
}
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body></html>
