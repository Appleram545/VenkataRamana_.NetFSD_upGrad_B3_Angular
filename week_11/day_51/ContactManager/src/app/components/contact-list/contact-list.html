<h2>contact list </h2>

<ul>
  <li *ngFor="let contact of contacts">
    {{contact.name}}

    <button (click)="viewContact(contact.id)">View</button>
  </li>
</ul>

<p *ngIf="contacts.length == 0 ; else data">
  No contacts available
</p>

<ng-template #data>
  <p>Total Contacts: {{ contacts.length }}</p>
</ng-template>
